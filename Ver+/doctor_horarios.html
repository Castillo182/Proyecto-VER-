<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horarios | Ver+ Doctor</title>

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/auth.css">

  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body data-page="doctor_horarios">

<div class="dashboard-layout">

  <div id="doctorSidebar"></div>

  <main class="dashboard-main">

    <header class="dashboard-header">
      <div>
        <span class="badge">Agenda médica</span>
        <h1>Horarios disponibles</h1>
        <p>Publica horarios para que tus pacientes puedan agendar cita.</p>
      </div>
    </header>

    <section class="dashboard-content patient-grid">

      <div class="panel">
        <div class="panel-header">
          <h2>Crear horario</h2>
        </div>

        <form id="formHorario">
          <div class="form-group">
            <label for="fecha">Fecha</label>
            <input type="date" id="fecha" required>
          </div>

          <div class="form-group">
            <label for="hora_inicio">Hora inicio</label>
            <input type="time" id="hora_inicio" required>
          </div>

          <div class="form-group">
            <label for="hora_fin">Hora fin</label>
            <input type="time" id="hora_fin" required>
          </div>

          <button type="submit" class="btn btn-primary auth-btn">
            Guardar horario
          </button>
        </form>

        <p id="mensaje" class="auth-message"></p>
      </div>

      <div class="panel">
        <div class="panel-header">
          <h2>Mis horarios</h2>
        </div>

        <div id="listaHorarios" class="timeline-list">
          <p>Cargando horarios...</p>
        </div>
      </div>

    </section>

  </main>

</div>

<script src="js/cargarDoctorSidebar.js"></script>
<script type="module" src="js/pages/doctor_horarios.js"></script>
<script>lucide.createIcons();</script>

</body>
</html>
