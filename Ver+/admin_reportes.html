<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reportes | Ver+ Admin</title>

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">

  <link rel="stylesheet" href="css/dashboard.css">

  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body data-page="admin_reportes">

<div class="dashboard-layout">

  <div id="adminSidebar"></div>

  <main class="dashboard-main">

      <div>
        <span class="badge">Reportes administrativos</span>
        <h1>Reportes del sistema</h1>

      <div class="header-card">
        <i data-lucide="file-text"></i>
        <span>Reportes</span>
      </div>
    </header>

    <section class="panel">
      <div class="panel-header">
        <h2>Próximamente</h2>
      </div>

      <p>Esta sección queda lista para conectar reportes administrativos generales.</p>

</div>

<script src="js/cargarAdminSidebar.js"></script>
<script>lucide.createIcons();</script>
