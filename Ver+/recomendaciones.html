<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recomendaciones | Ver+</title>

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/dashboard.css">

  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body data-page="recomendaciones">

<div class="dashboard-layout">

  <div id="pacienteSidebar"></div>

  <main class="dashboard-main">

    <header class="dashboard-header">
      <div>
        <span class="badge">Consejos personalizados</span>
        <h1>Recomendaciones</h1>
        <p>Consulta actividades sugeridas y consejos para el seguimiento visual.</p>
      </div>
    </header>

    <section class="panel">
      <div class="form-group">
        <label>Selecciona el niño</label>

        <input type="hidden" id="selectorNino">

        <div id="selectorNinosCards" class="child-selector">
          <p>Cargando perfiles...</p>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <h2>Recomendaciones del paciente</h2>
      </div>

      <div id="listaRecomendaciones" class="timeline-list">
        <p>Selecciona un niño.</p>
      </div>
    </section>

  </main>

</div>

<script src="js/cargarPacienteSidebar.js"></script>
<script type="module" src="js/pages/recomendaciones.js"></script>
<script>
  lucide.createIcons();
</script>

</body>
</html>
