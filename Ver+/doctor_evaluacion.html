<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evaluación médica | Ver+ Doctor</title>

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/auth.css">

  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body data-page="doctor_evaluacion">

<div class="dashboard-layout">

  <div id="doctorSidebar"></div>

  <main class="dashboard-main">

    <header class="dashboard-header">
      <div>
        <span class="badge">Evaluación clínica</span>
        <h1>Evaluación médica del paciente</h1>
        <p>Registra diagnóstico, seguimiento, indicaciones y recomendaciones médicas.</p>
      </div>
    </header>

    <section class="panel">
      <div class="form-group">
        <label>Selecciona paciente</label>

        <input type="hidden" id="selectorPaciente">

        <div id="selectorPacientesCards" class="child-selector">
          <p>Cargando pacientes...</p>
        </div>
      </div>
    </section>

    <section class="dashboard-content patient-grid">

      <div class="panel">
        <div class="panel-header">
          <h2>Datos del paciente</h2>
        </div>

        <div id="datosPaciente" class="timeline-item">
          <p>Selecciona un paciente para ver su información.</p>
        </div>

        <div class="panel-header" style="margin-top:24px;">
          <h2>Historial de evaluaciones</h2>
        </div>

        <div id="historialEvaluaciones" class="timeline-list">
          <p>Selecciona un paciente.</p>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <h2>Nueva evaluación médica</h2>
        </div>

        <form id="formEvaluacion">

          <div class="form-group">
            <label for="tipoEvaluacion">Tipo de evaluación</label>
            <select id="tipoEvaluacion" required>
              <option value="Consulta médica">Consulta médica</option>
              <option value="Revisión de seguimiento">Revisión de seguimiento</option>
              <option value="Evaluación visual clínica">Evaluación visual clínica</option>
              <option value="Control posterior a cita">Control posterior a cita</option>
            </select>
          </div>

          <div class="form-group">
            <label for="estadoSeguimiento">Estado de seguimiento</label>
            <select id="estadoSeguimiento" required>
              <option value="Adecuado">Adecuado</option>
              <option value="En seguimiento">En seguimiento</option>
              <option value="Requiere observación">Requiere observación</option>
              <option value="Requiere atención prioritaria">Requiere atención prioritaria</option>
            </select>
          </div>

          <div class="form-group">
            <label>
              <input type="checkbox" id="requiereRevision">
              Requiere nueva revisión médica
            </label>
          </div>

          <div class="form-group">
            <label for="diagnostico">Diagnóstico</label>
            <textarea
              id="diagnostico"
              rows="4"
              placeholder="Ej. Seguimiento visual adecuado / sospecha de estrabismo / requiere valoración posterior..."
              required></textarea>
          </div>

          <div class="form-group">
            <label for="observaciones">Observaciones clínicas</label>
            <textarea
              id="observaciones"
              rows="4"
              placeholder="Describe lo observado durante la consulta."></textarea>
          </div>

          <div class="form-group">
            <label for="indicaciones">Indicaciones y recomendaciones</label>
            <textarea
              id="indicaciones"
              rows="4"
              placeholder="Ej. Realizar ejercicios de seguimiento visual, evitar pantallas, acudir a revisión..."></textarea>
          </div>

          <div class="form-group">
            <label for="medicamentos">Medicamentos / tratamiento</label>
            <textarea
              id="medicamentos"
              rows="3"
              placeholder="Ej. Sin medicamentos / gotas indicadas / tratamiento recomendado..."></textarea>
          </div>

          <div class="form-group">
            <label for="proximaRevision">Próxima revisión</label>
            <input type="date" id="proximaRevision">
          </div>

          <button type="submit" class="btn btn-primary auth-btn">
            Guardar evaluación
          </button>

        </form>

        <p id="mensaje" class="auth-message"></p>
      </div>

    </section>

  </main>

</div>

<script src="js/cargarDoctorSidebar.js"></script>
<script type="module" src="js/pages/doctor_evaluacion.js"></script>
<script>lucide.createIcons();</script>

</body>
</html>
